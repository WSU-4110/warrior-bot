name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read
  # Needed to comment on PRs from the same repository.
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test.sh
        id: tests
        continue-on-error: true
        run: bash test.sh 2>&1 | tee test-output.txt

      - name: Add job summary
        if: always()
        run: |
          echo "## test.sh (${{ steps.tests.outcome }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat test-output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with test results
        # Fork PRs use a read-only token; skip comment to avoid permission errors.
        if: >
          always() && github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- warrior-bot-test-sh -->";
            const outcome = process.env.TEST_OUTCOME;
            const status = outcome === "success" ? "✅ passed" : "❌ failed";
            let log = "";
            try {
              log = fs.readFileSync("test-output.txt", "utf8");
            } catch {
              log = "(could not read test-output.txt)";
            }
            const max = 55000;
            const truncated =
              log.length > max ? log.slice(0, max) + "\n\n…(truncated)" : log;
            const body = [
              marker,
              `### \`test.sh\` ${status}`,
              "",
              "<details><summary>Full output</summary>",
              "",
              "```",
              truncated,
              "```",
              "",
              "</details>",
              "",
              `Workflow: ${context.runId} · Commit: \`${context.sha.slice(0, 7)}\``,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) =>
              (c.body || "").includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
